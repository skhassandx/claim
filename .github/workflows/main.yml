name: Robi Daily Point Claim

on:
  schedule:
    # প্রতিদিন বাংলাদেশ সময় সকাল ৮ টায় (UTC ২ টা) রান করবে
    - cron: '0 2 * * *' 
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

jobs:
  claim-points:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Script
        run: python robi_claim.py
